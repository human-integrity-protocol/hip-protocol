// S43: Prepare light (white) and dark (black) badge canvases
var _hipBadgeLight=null,_hipBadgeDark=null;
(function(){
  var img=new Image();img.src="data:image/png;base64,"+HIP_BADGE_B64;
  img.onload=function(){
    var sz=img.width;
    var dc=document.createElement("canvas");dc.width=sz;dc.height=sz;dc.getContext("2d").drawImage(img,0,0);_hipBadgeDark=dc;
    var lc=document.createElement("canvas");lc.width=sz;lc.height=sz;var lx=lc.getContext("2d");lx.drawImage(img,0,0);
    var id=lx.getImageData(0,0,sz,sz),d=id.data;for(var i=0;i<d.length;i+=4){d[i]=255-d[i];d[i+1]=255-d[i+1];d[i+2]=255-d[i+2]}
    lx.putImageData(id,0,0);_hipBadgeLight=lc;
  };
})();
// S43: Composite badge onto image canvas, returns canvas. src=Image or canvas, cfg={corner,mode,size,opacity,margin}
function hipBadgeComposite(src,w,h,cfg){
  var cv=document.createElement("canvas");cv.width=w;cv.height=h;var ctx=cv.getContext("2d");
  ctx.drawImage(src,0,0,w,h);
  var bSz=Math.round(Math.min(w,h)*(cfg.size/100)),m=Math.round(Math.min(w,h)*(cfg.margin/100));
  var x,y;
  switch(cfg.corner){case"tl":x=m;y=m;break;case"tr":x=w-bSz-m;y=m;break;case"bl":x=m;y=h-bSz-m;break;default:x=w-bSz-m;y=h-bSz-m;}
  var badge;
  if(cfg.mode==="light"){badge=_hipBadgeLight}
  else if(cfg.mode==="dark"){badge=_hipBadgeDark}
  else{var id=ctx.getImageData(Math.max(0,x),Math.max(0,y),Math.max(1,bSz),Math.max(1,bSz)).data,sum=0,ct=0;
    for(var i=0;i<id.length;i+=4){sum+=id[i]*0.299+id[i+1]*0.587+id[i+2]*0.114;ct++}
    badge=(ct>0&&sum/ct>128)?_hipBadgeDark:_hipBadgeLight;}
  ctx.globalAlpha=cfg.opacity;ctx.drawImage(badge,x,y,bSz,bSz);ctx.globalAlpha=1;
  return cv;
}

// ── S37: Perceptual hash (DCT-based, 64-bit) ──
// Computes a perceptual fingerprint of an image that is robust to
// resizing, compression changes, and screenshot capture.
// Returns a 16-char hex string (64 bits). Returns null for non-images.
var computePHash = async function(fileOrBytes, filename) {
  var isImg = /\.(jpe?g|png|webp|gif|bmp)$/i.test(filename||"");
  if(!isImg) return null;
  return new Promise(function(resolve) {
    try {
      var url;
      if(fileOrBytes instanceof File) {
        url = URL.createObjectURL(fileOrBytes);
      } else {
        url = URL.createObjectURL(new Blob([fileOrBytes]));
      }
      var img = new Image();
      img.onload = function() {
        try {
          var SIZE = 32; // downsample to 32x32
          var c = document.createElement("canvas");
          c.width = SIZE; c.height = SIZE;
          var ctx = c.getContext("2d");
          ctx.drawImage(img, 0, 0, SIZE, SIZE);
          var data = ctx.getImageData(0, 0, SIZE, SIZE).data;
          // Convert to grayscale
          var gray = new Float32Array(SIZE * SIZE);
          for(var i=0;i<SIZE*SIZE;i++) gray[i] = 0.299*data[i*4] + 0.587*data[i*4+1] + 0.114*data[i*4+2];
          // DCT on 8x8 blocks (simplified: use mean of 8x8 regions across 32x32)
          // Standard pHash: reduce to 8x8 DCT coefficients, use top-left 8x8
          var DCT_SIZE = 8;
          var dct = new Float32Array(DCT_SIZE * DCT_SIZE);
          var blockW = SIZE / DCT_SIZE; // 4 pixels per block
          for(var by=0;by<DCT_SIZE;by++) {
            for(var bx=0;bx<DCT_SIZE;bx++) {
              var sum = 0;
              for(var py=0;py<blockW;py++) for(var px=0;px<blockW;px++) {
                sum += gray[(by*blockW+py)*SIZE + (bx*blockW+px)];
              }
              dct[by*DCT_SIZE+bx] = sum / (blockW*blockW);
            }
          }
          // Compute mean of DCT values
          var mean = dct.reduce(function(a,v){return a+v},0) / dct.length;
          // Build 64-bit hash as two 32-bit integers: each bit = dct value >= mean
          var hi = 0; var lo = 0;
          for(var k=0;k<32;k++) hi = (hi << 1) | (dct[k] >= mean ? 1 : 0);
          for(var k=32;k<64;k++) lo = (lo << 1) | (dct[k] >= mean ? 1 : 0);
          // Return as 16-char hex
          var h = ((hi >>> 0).toString(16).padStart(8,"0")) + ((lo >>> 0).toString(16).padStart(8,"0"));
          URL.revokeObjectURL(url);
          resolve(h);
        } catch(ex) { URL.revokeObjectURL(url); resolve(null); }
      };
      img.onerror = function() { URL.revokeObjectURL(url); resolve(null); };
      img.src = url;
    } catch(ex) { resolve(null); }
  });
};

// Hamming distance between two 16-char hex pHash strings (0-64)
// Uses 32-bit integer pairs to avoid BigInt — compatible with all browsers
var pHashDistance = function(a, b) {
  if(!a||!b||a.length!==16||b.length!==16) return null;
  try {
    // Split 64-bit hash into two 32-bit halves
    var ah = parseInt(a.substring(0,8), 16)|0;
    var al = parseInt(a.substring(8,16), 16)|0;
    var bh = parseInt(b.substring(0,8), 16)|0;
    var bl = parseInt(b.substring(8,16), 16)|0;
    var xh = ah ^ bh; var xl = al ^ bl;
    // Popcount each 32-bit value
    function pop32(n) {
      n = n >>> 0; // treat as unsigned
      n = n - ((n >>> 1) & 0x55555555);
      n = (n & 0x33333333) + ((n >>> 2) & 0x33333333);
      n = (n + (n >>> 4)) & 0x0f0f0f0f;
      return (n * 0x01010101) >>> 24;
    }
    return pop32(xh) + pop32(xl);
  } catch(ex) { return null; }
};

// pHash similarity as percentage (0-100)
var pHashSimilarity = function(a, b) {
  var d = pHashDistance(a, b);
  if(d === null) return null;
  return Math.round(((64 - d) / 64) * 100);
};
var b64e = function(b) { var s=""; var u=new Uint8Array(b); for(var i=0;i<u.length;i++) s+=String.fromCharCode(u[i]); return btoa(s) };
var b64d = function(s) { var b=atob(s); var u=new Uint8Array(b.length); for(var i=0;i<b.length;i++) u[i]=b.charCodeAt(i); return u };

var canonJSON = function(o) {
  if(o===null||o===undefined) return "null";
  if(typeof o==="boolean") return o?"true":"false";
  if(typeof o==="number") { if(!isFinite(o)) throw new Error("!"); return Object.is(o,-0)?"0":String(o) }
  if(typeof o==="string") return JSON.stringify(o);
  if(Array.isArray(o)) return "["+o.map(function(v){return canonJSON(v)}).join(",")+"]";
  return "{"+Object.keys(o).sort().filter(function(k){return o[k]!==undefined}).map(function(k){return JSON.stringify(k)+":"+canonJSON(o[k])}).join(",")+"}"
};

// ── EXIF / HIP Metadata helpers ──
var HIP_EXIF_MARKER = "HIP-Protocol:attested";
var HAS_PIEXIF = typeof piexif !== "undefined";

function isJpeg(fname) {
  if(!fname) return false;
  var ext = fname.toLowerCase().split(".").pop();
  return ext === "jpg" || ext === "jpeg";
}

// S34: PNG support
function isPng(fname) {
  if(!fname) return false;
  return fname.toLowerCase().split(".").pop() === "png";
}

// S41: WebP support
function isWebP(fname) {
  if(!fname) return false;
  return fname.toLowerCase().split(".").pop() === "webp";
}

// S34/S41: Check if file is an image type that supports HIP metadata embedding
function isEmbeddable(fname) {
  return isJpeg(fname) || isPng(fname) || isWebP(fname);
}

function fileToDataURL(file) {
  return new Promise(function(resolve, reject) {
    var r = new FileReader();
    r.onload = function() { resolve(r.result); };
    r.onerror = function() { reject(new Error("Failed to read file")); };
    r.readAsDataURL(file);
  });
}

function dataURLtoBytes(dataURL) {
  var parts = dataURL.split(",");
  var raw = atob(parts[1]);
  var arr = new Uint8Array(raw.length);
  for(var i=0;i<raw.length;i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

function readHipExif(dataURL) {
  if(!HAS_PIEXIF) return null;
  try {
    var exifObj = piexif.load(dataURL);
    var uc = exifObj.Exif && exifObj.Exif[piexif.ExifIFD.UserComment];
    if(uc) {
      var str = typeof uc === "string" ? uc : new TextDecoder().decode(new Uint8Array(uc));
      str = str.replace(/^ASCII\x00\x00\x00/, "");
      if(str.indexOf(HIP_EXIF_MARKER) !== -1) {
        try { return JSON.parse(str.substring(str.indexOf("{"))); }
        catch(ex) { return {raw:str}; }
      }
    }
    return null;
  } catch(ex) { return null; }
}

function embedHipExif(dataURL, hipMeta) {
  if(!HAS_PIEXIF) throw new Error("EXIF library not available");
  try {
    var exifObj;
    try { exifObj = piexif.load(dataURL); }
    catch(ex) { exifObj = {"0th":{},"Exif":{},"GPS":{},"1st":{}}; }
    if(!exifObj.Exif) exifObj.Exif = {};
    if(!exifObj["0th"]) exifObj["0th"] = {};
    var metaStr = JSON.stringify(hipMeta);
    exifObj.Exif[piexif.ExifIFD.UserComment] = metaStr;
    exifObj["0th"][piexif.ImageIFD.ImageDescription] = "HIP Attested — hipprotocol.org — ProofCard: " + hipMeta.proofCardFilename;
    exifObj["0th"][piexif.ImageIFD.Software] = "HIP Protocol (hipprotocol.org)";
    var exifStr = piexif.dump(exifObj);
    return piexif.insert(exifStr, dataURL);
  } catch(ex) {
    throw new Error("Failed to embed EXIF: " + ex.message);
  }
}

// ── S34: PNG tEXt chunk read/write ──

  if(!obj.publicKey || !obj.privateKey || !obj.credentialId) throw new Error("Invalid credential file — missing required fields.");
  var privBuf = b64d(obj.privateKey);
  var priv = await crypto.subtle.importKey("pkcs8", privBuf, "Ed25519", false, ["sign"]);
  var pubBuf = unhex(obj.publicKey);
  var pubObj = await crypto.subtle.importKey("raw", pubBuf, "Ed25519", true, ["verify"]);
  // Verify credential ID = SHA-256(public key)
  var computedCid = await sha256(pubBuf);
  if(computedCid !== obj.credentialId) throw new Error("Credential ID mismatch — file may be corrupted. Expected "+computedCid+" but file says "+obj.credentialId);
  return {pub:obj.publicKey, cid:obj.credentialId, priv:priv, pubObj:pubObj};
}

<!-- S66: QR Camera Scanner overlay -->
<div id="qrScanOverlayHP" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:rgba(0,0,0,0.92);flex-direction:column;align-items:center;justify-content:center;padding:20px">
  <div style="width:100%;max-width:400px;text-align:center">
    <div style="font-family:'Azeret Mono',monospace;font-size:11px;letter-spacing:2px;color:#E05A00;margin-bottom:16px;text-transform:uppercase">SCAN CREDENTIAL QR CODE</div>
    <div style="position:relative;width:100%;aspect-ratio:1;border-radius:16px;overflow:hidden;border:2px solid #E05A00;background:#000">
      <video id="qrVideoHP" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover"></video>
      <canvas id="qrCanvasHP" style="display:none"></canvas>
      <div style="position:absolute;inset:0;pointer-events:none">
        <div style="position:absolute;top:15%;left:15%;right:15%;bottom:15%;border:2px solid rgba(224,90,0,0.5);border-radius:12px"></div>
      </div>
    </div>
    <div id="qrScanStatusHP" style="margin-top:14px;font-size:13px;color:#ccc;line-height:1.5">Point your camera at the QR code…</div>
    <button onclick="stopQRScannerHP()" style="margin-top:16px;padding:12px 32px;background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:8px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif">Cancel</button>
  </div>
</div>

<script>
// S66: QR Camera Scanner for hipprotocol.org
var _qrStreamHP = null;
var _qrAnimFrameHP = null;
var _jsQRLoadedHP = false;
var _qrImportCallbackHP = null;
var _qrErrCallbackHP = null;

function _loadJsQRHP() {
  if (_jsQRLoadedHP && window.jsQR) return Promise.resolve();
  return new Promise(function(resolve, reject) {
    var s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js";
    s.onload = function() { _jsQRLoadedHP = true; resolve(); };
    s.onerror = function() { reject(new Error("Failed to load QR scanner library.")); };
    document.head.appendChild(s);
  });
}

function startQRScannerHP(importFn, errFn) {
  _qrImportCallbackHP = importFn;
  _qrErrCallbackHP = errFn;
  var overlay = document.getElementById("qrScanOverlayHP");
  var statusEl = document.getElementById("qrScanStatusHP");
  overlay.style.display = "flex";
  statusEl.textContent = "Starting camera…";

  _loadJsQRHP().then(function() {
    return navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 640 } }
    });
  }).then(function(stream) {
    _qrStreamHP = stream;
    var video = document.getElementById("qrVideoHP");
    video.srcObject = stream;
    video.onloadedmetadata = function() {
      video.play();
      statusEl.textContent = "Point your camera at the QR code…";
      _scanQRFrameHP();
    };
  }).catch(function(err) {
    statusEl.textContent = "Camera access denied or not available. " + (err.message || "");
  });
}

function _scanQRFrameHP() {
  var video = document.getElementById("qrVideoHP");
  var canvas = document.getElementById("qrCanvasHP");
  if (!video || !canvas || !_qrStreamHP) return;
  if (video.readyState !== video.HAVE_ENOUGH_DATA) {
    _qrAnimFrameHP = requestAnimationFrame(_scanQRFrameHP);
    return;
  }
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  var ctx = canvas.getContext("2d", { willReadFrequently: true });
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  var code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: "dontInvert" });
  if (code && code.data) {
    _handleQRResultHP(code.data);
    return;
  }
  _qrAnimFrameHP = requestAnimationFrame(_scanQRFrameHP);
}

function _handleQRResultHP(data) {
  var statusEl = document.getElementById("qrScanStatusHP");
  var importIdx = data.indexOf("#hip-import=");
  if (importIdx === -1) {
    statusEl.innerHTML = '<span style="color:#f87171">Not a HIP credential QR code.</span> Keep scanning…';
    setTimeout(function() { _scanQRFrameHP(); }, 1500);
    return;
  }
  var payload = data.substring(importIdx + "#hip-import=".length);
  if (!payload) {
    statusEl.innerHTML = '<span style="color:#f87171">Empty credential payload.</span> Keep scanning…';
    setTimeout(function() { _scanQRFrameHP(); }, 1500);
    return;
  }
  statusEl.innerHTML = '<span style="color:#34d399">✓ Credential QR code detected! Importing…</span>';
  stopQRScannerHP();

  try {
    // Base64url decode
    var b64 = payload.replace(/-/g, "+").replace(/_/g, "/");
    while (b64.length % 4 !== 0) b64 += "=";
    var binary = atob(b64);
    var bytes = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    var json = new TextDecoder().decode(bytes);
    var credObj = JSON.parse(json);

    if (!credObj || credObj.version !== "hip-credential-v1" || !credObj.credentialId || !credObj.publicKey || !credObj.privateKey) {
      throw new Error("Invalid credential data.");
    }

    // Use the existing import function (handles conflict detection etc.)
    if (_qrImportCallbackHP) {
      _qrImportCallbackHP(credObj, null);
    }
  } catch (ex) {
    if (_qrErrCallbackHP) {
      _qrErrCallbackHP("QR import failed: " + (ex.message || "Could not decode credential."));
    }
  }
}

function stopQRScannerHP() {
  if (_qrAnimFrameHP) { cancelAnimationFrame(_qrAnimFrameHP); _qrAnimFrameHP = null; }
  if (_qrStreamHP) {
    _qrStreamHP.getTracks().forEach(function(t) { t.stop(); });
    _qrStreamHP = null;
  }
  var video = document.getElementById("qrVideoHP");
  if (video) video.srcObject = null;
  var overlay = document.getElementById("qrScanOverlayHP");
  if (overlay) overlay.style.display = "none";
}
</script>
