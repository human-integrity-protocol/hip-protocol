var CRED_VERSION = "hip-credential-v1";

async function exportCredential(cred) {
  // Export private key as PKCS8, public as raw
  var privBytes = await crypto.subtle.exportKey("pkcs8", cred.priv);
  var obj = {
    version: CRED_VERSION,
    credentialId: cred.cid,
    publicKey: cred.pub,
    privateKey: b64e(privBytes),
    created: new Date().toISOString(),
    warning: "This file contains your private key. Anyone with this file can sign attestations as you. Store it securely."
  };
  return obj;
}

async function importCredential(obj) {
  if(obj.version !== CRED_VERSION) throw new Error("Unsupported credential version: "+obj.version);
  if(!obj.publicKey || !obj.privateKey || !obj.credentialId) throw new Error("Invalid credential file — missing required fields.");
  var privBuf = b64d(obj.privateKey);
  var priv = await crypto.subtle.importKey("pkcs8", privBuf, "Ed25519", false, ["sign"]);
  var pubBuf = unhex(obj.publicKey);
  var pubObj = await crypto.subtle.importKey("raw", pubBuf, "Ed25519", true, ["verify"]);
  // Verify credential ID = SHA-256(public key)
  var computedCid = await sha256(pubBuf);
  if(computedCid !== obj.credentialId) throw new Error("Credential ID mismatch — file may be corrupted. Expected "+computedCid+" but file says "+obj.credentialId);
  return {pub:obj.publicKey, cid:obj.credentialId, priv:priv, pubObj:pubObj};
}

var HIP_CRED_KEY = "hip_credential_v1";

function saveCredToStorage(cred) {
  try {
    var obj = Object.assign({}, cred);
    delete obj._priv; delete obj._pub;
    localStorage.setItem(HIP_CRED_KEY, JSON.stringify(obj));
  } catch(ex) { /* localStorage may be unavailable */ }

function loadCredFromStorage() {
  try {
    var raw = localStorage.getItem(HIP_CRED_KEY);
    if(!raw) return null;
    var cred = JSON.parse(raw);
    // S29: Tier migration — Tier 2 biometric → Tier 3, Tier 3 vouch → Tier 2
    if(cred && cred.version === "hip-credential-v1" && !cred._tierMigrated) {
      var changed = false;
      if(cred.tier === 2 && cred.pathway === "device-biometric-webauthn-v1") {
        cred.tier = 3; changed = true;
      } else if(cred.tier === 3 && cred.pathway === "peer-vouch-bound-token-v1") {
        cred.tier = 2; changed = true;
      }
      if(changed) {
        cred._tierMigrated = "s29";
        localStorage.setItem(HIP_CRED_KEY, JSON.stringify(cred));
      }
    }
    return cred;
  } catch(ex) { return null; }
}

function clearCredStorage() {
  try { localStorage.removeItem(HIP_CRED_KEY); } catch(ex) {}
