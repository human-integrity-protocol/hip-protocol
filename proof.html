<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#0A0A0A;font-family:'Space Grotesk',sans-serif;color:#E8E8E0;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:#E05A00;text-decoration:none}
a:hover{text-decoration:underline}
::selection{background:rgba(224,90,0,0.3);color:#fff}
.mono{font-family:'Azeret Mono','SF Mono',monospace}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(10,10,10,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.nav-brand{font-family:'Azeret Mono',monospace;font-size:13px;font-weight:500;letter-spacing:1px;color:#E8E8E0;display:flex;align-items:center;gap:10px}
.nav-brand .hip{color:#E8E8E0}.nav-brand .sep{color:#E05A00}
.nav-links{display:flex;gap:20px;align-items:center}
.nav-links a{font-family:'Azeret Mono',monospace;font-size:11px;letter-spacing:0.5px;color:#666;transition:color 0.15s}
.nav-links a:hover{color:#E8E8E0;text-decoration:none}
.wrap{max-width:720px;margin:0 auto;padding:48px 24px 80px}
/* Loading / error states */
.state-box{text-align:center;padding:80px 24px}
.state-box h2{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:400;color:#E8E8E0;margin-bottom:12px}
.state-box p{font-size:15px;color:#666;line-height:1.7;max-width:480px;margin:0 auto}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid rgba(255,255,255,0.06);border-top-color:#E05A00;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:24px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Badge */
.badge-wrap{display:flex;justify-content:center;margin-bottom:32px}
.badge-img{width:80px;height:80px;filter:invert(1)}
.badge-img.verified{filter:invert(0) sepia(1) saturate(5) hue-rotate(5deg) brightness(0.9);opacity:0.9}
.badge-img.unverified{filter:invert(1);opacity:0.2}
.badge-img.sealed{filter:invert(0) sepia(1) saturate(2) hue-rotate(190deg) brightness(0.8);opacity:0.7}
/* Proof card */
.proof-card{background:#111;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:32px;margin-bottom:24px;position:relative;overflow:hidden}
.proof-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#E05A00,rgba(224,90,0,0.3))}
.proof-card.sealed-card::before{background:linear-gradient(90deg,#4A6FA5,rgba(74,111,165,0.3))}
.proof-card.invalid-card::before{background:linear-gradient(90deg,#ef4444,rgba(239,68,68,0.3))}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px}
.card-title-group{}
.card-label{font-family:'Azeret Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#E05A00;margin-bottom:6px}
.card-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(20px,4vw,28px);font-weight:400;color:#E8E8E0;line-height:1.2}
.status-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;font-family:'Azeret Mono',monospace;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;white-space:nowrap}
.pill-verified{background:rgba(224,90,0,0.12);border:1px solid rgba(224,90,0,0.3);color:#E05A00}
.pill-sealed{background:rgba(74,111,165,0.12);border:1px solid rgba(74,111,165,0.3);color:#6B9FD4}
.pill-invalid{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#ef4444}
.pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
/* Fields */
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.field-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:520px){.field-grid,.field-grid-3{grid-template-columns:1fr}}
.field{}
.field-label{font-family:'Azeret Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#555;margin-bottom:5px}
.field-val{font-size:15px;color:#E8E8E0;font-weight:500;line-height:1.4}
.field-val.mono{font-size:11px;color:#888;word-break:break-all}
.field-val.cls{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:400;color:#E8E8E0}
.field-val.tier-1{color:#E05A00}.field-val.tier-2{color:#f59e0b}.field-val.tier-3{color:#888}
.divider{height:1px;background:rgba(255,255,255,0.06);margin:20px 0}
/* Sig verification */
.sig-block{padding:14px 16px;border-radius:8px;margin-bottom:20px;font-size:13px;line-height:1.6}
.sig-ok{background:rgba(74,222,128,0.04);border:1px solid rgba(74,222,128,0.15);color:#4ade80}
.sig-fail{background:rgba(239,68,68,0.04);border:1px solid rgba(239,68,68,0.15);color:#ef4444}
.sig-pending{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);color:#666}
/* Verify zones */
.verify-section{background:#0d0d0d;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:24px;margin-bottom:16px}
.verify-title{font-family:'Azeret Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#555;margin-bottom:4px}
.verify-desc{font-size:13px;color:#555;line-height:1.6;margin-bottom:16px}
.drop-zone{border:2px dashed rgba(255,255,255,0.1);border-radius:8px;padding:24px 20px;text-align:center;cursor:pointer;transition:border-color 0.15s,background 0.15s}
.drop-zone:hover,.drop-zone.drag-over{border-color:rgba(224,90,0,0.4);background:rgba(224,90,0,0.03)}
.drop-label{font-size:13px;color:#555}
.drop-result{margin-top:12px;padding:12px 14px;border-radius:6px;font-size:13px;line-height:1.6}
.match-exact{background:rgba(74,222,128,0.06);border:1px solid rgba(74,222,128,0.2);color:#4ade80}
.match-high{background:rgba(74,222,128,0.04);border:1px solid rgba(74,222,128,0.12);color:#4ade80}
.match-med{background:rgba(245,158,11,0.04);border:1px solid rgba(245,158,11,0.15);color:#f59e0b}
.match-low{background:rgba(239,68,68,0.04);border:1px solid rgba(239,68,68,0.15);color:#ef4444}
.match-none{background:rgba(239,68,68,0.04);border:1px solid rgba(239,68,68,0.15);color:#ef4444}
/* Embed code */
.embed-section{background:#0d0d0d;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:24px;margin-bottom:16px}
.embed-title{font-family:'Azeret Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#555;margin-bottom:4px}
.embed-desc{font-size:13px;color:#555;line-height:1.6;margin-bottom:16px}
.code-block{background:#080808;border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:14px 16px;font-family:'Azeret Mono',monospace;font-size:11px;color:#888;word-break:break-all;line-height:1.7;position:relative}
.copy-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#666;cursor:pointer;font-family:'Azeret Mono',monospace;font-size:10px;padding:4px 10px;border-radius:4px;margin-top:8px;display:inline-block;transition:all 0.2s}
.copy-btn:hover{background:rgba(255,255,255,0.08);color:#E8E8E0}
/* Honest boundary */
.boundary{padding:14px 16px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);font-size:12px;color:#555;line-height:1.7;margin-bottom:24px;font-style:italic}
/* Footer */
.footer{text-align:center;padding:40px 24px 20px;font-size:12px;color:#444;border-top:1px solid rgba(255,255,255,0.04)}
.footer a{color:#666}
.footer a:hover{color:#E8E8E0}
/* Not found */
.not-found{text-align:center;padding:80px 24px}
</style>
</head>

// ── Helpers ──
var hex = function(b){return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,"0")}).join("")};
var unhex = function(h){var b=new Uint8Array(h.length/2);for(var i=0;i<h.length;i+=2)b[i/2]=parseInt(h.substr(i,2),16);return b};
var b64d = function(s){var b=atob(s);var u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u};

function qs(id){return document.getElementById(id)}
function setHTML(id,h){var el=qs(id);if(el)el.innerHTML=h}
function show(id){var el=qs(id);if(el)el.style.display=""}
function hide(id){var el=qs(id);if(el)el.style.display="none"}

// ── Get content hash from URL ──
// Supports: /proof/[hash]  or  ?hash=[hash]
function getHashFromURL(){
  var path=window.location.pathname;
  var m=path.match(/\/proof\/([0-9a-f]{64})/i);
  if(m)return m[1].toLowerCase();
  var params=new URLSearchParams(window.location.search);
  var h=params.get("hash");
  if(h&&/^[0-9a-f]{64}$/i.test(h))return h.toLowerCase();
  return null;
}

// ── Format timestamp ──
function fmtDate(iso){
  if(!iso)return "—";
  try{
    var d=new Date(iso);
    return d.toUTCString().replace(" GMT","") + " UTC";
  }catch(e){return iso}
}

// ── pHash helpers (same as hipprotocol_index.html) ──
var pHashDistance=function(a,b){
  if(!a||!b||a.length!==16||b.length!==16)return null;
  try{
    var ah=parseInt(a.substring(0,8),16)|0; var al=parseInt(a.substring(8,16),16)|0;
    var bh=parseInt(b.substring(0,8),16)|0; var bl=parseInt(b.substring(8,16),16)|0;
    var xh=ah^bh; var xl=al^bl;
    function pop32(n){n=n>>>0;n=n-((n>>>1)&0x55555555);n=(n&0x33333333)+((n>>>2)&0x33333333);n=(n+(n>>>4))&0x0f0f0f0f;return(n*0x01010101)>>>24}
    return pop32(xh)+pop32(xl);
  }catch(e){return null}
};
var pHashSimilarity=function(a,b){var d=pHashDistance(a,b);if(d===null)return null;return Math.round(((64-d)/64)*100)};

var computePHash=function(imgEl){
  return new Promise(function(resolve){
    try{
      var SIZE=32;
      var c=document.createElement("canvas");c.width=SIZE;c.height=SIZE;
      var ctx=c.getContext("2d");ctx.drawImage(imgEl,0,0,SIZE,SIZE);
      var data=ctx.getImageData(0,0,SIZE,SIZE).data;
      var gray=new Float32Array(SIZE*SIZE);
      for(var i=0;i<SIZE*SIZE;i++)gray[i]=0.299*data[i*4]+0.587*data[i*4+1]+0.114*data[i*4+2];
      var DCT_SIZE=8;var dct=new Float32Array(DCT_SIZE*DCT_SIZE);
      var blockW=SIZE/DCT_SIZE;
      for(var by=0;by<DCT_SIZE;by++)for(var bx=0;bx<DCT_SIZE;bx++){
        var sum=0;
        for(var py=0;py<blockW;py++)for(var px=0;px<blockW;px++)sum+=gray[(by*blockW+py)*SIZE+(bx*blockW+px)];
        dct[by*DCT_SIZE+bx]=sum/(blockW*blockW);
      }
      var mean=dct.reduce(function(a,v){return a+v},0)/dct.length;
      var hi=0; var lo=0;
      for(var k=0;k<32;k++) hi=(hi<<1)|(dct[k]>=mean?1:0);
      for(var k=32;k<64;k++) lo=(lo<<1)|(dct[k]>=mean?1:0);
      resolve(((hi>>>0).toString(16).padStart(8,"0"))+((lo>>>0).toString(16).padStart(8,"0")));
    }catch(e){resolve(null)}
  });
};

// ── Ed25519 signature verification ──
async function verifyEd25519(publicKeyHex, message, signatureB64) {
  try {
    var pubKeyBytes = unhex(publicKeyHex);
    var key = await crypto.subtle.importKey(
      "raw", pubKeyBytes,
      {name:"Ed25519"}, false, ["verify"]
    );
    var msgBytes = new TextEncoder().encode(message);
    var sigBytes = b64d(signatureB64);
    return await crypto.subtle.verify("Ed25519", key, sigBytes, msgBytes);
  } catch(e) {
    return null; // null = browser doesn't support Ed25519 verify
  }
}

// ── SHA-256 ──
async function sha256(bytes){
  return hex(await crypto.subtle.digest("SHA-256", bytes instanceof Uint8Array ? bytes : new TextEncoder().encode(bytes)));
}

// ── Render badge img tag ──
function badgeImg(cls){
  return '<img src="data:image/png;base64,'+BADGE_B64+'" class="badge-img '+cls+'" alt="HIP Badge" width="80" height="80">';
}

// ── Main render ──
async function init(){
  var contentHash = getHashFromURL();

  if(!contentHash){
    renderNoHash();
    return;
  }

  // Fetch proof record
  var record = null;
  try{
    var resp = await fetch(WORKER_URL+"/api/proof/"+contentHash);
    var data = await resp.json();
    if(resp.status===404||!data.found){
      renderNotFound(contentHash);
      return;
    }
    record = data;
  }catch(e){
    renderError("Could not reach the HIP proof registry. Please try again.");
    return;
  }

  if(record.sealed){
    renderSealed(contentHash, record);

// ── Signature verification ──
async function verifySignature(record, hash){
  var el = qs("sig-status");
  if(!el) return;

  // Check if signature is present
  if(!record.signature){
    el.className="sig-block sig-fail";
    el.innerHTML="<strong>⚠ No signature present</strong> — this record cannot be cryptographically verified. Do not trust this page.";
    return;
  }

  // Reconstruct canonical string — try HIPKit format first, then legacy
  // HIPKit format (S49+): hash|credential_id|classification|attested_at|protocol_version
  // Legacy format: hash|perceptual_hash|credential_id|attested_at|classification
  var canonStrHIPKit = [
    hash,
    record.credential_id,
    record.classification,
    record.attested_at,
    record.protocol_version || "1.2"
  ].join("|");

  var canonStrLegacy = [
    hash,
    record.perceptual_hash || "NULL",
    record.credential_id,
    record.attested_at,
    record.classification
  ].join("|");

  // If public_key is available, perform full Ed25519 verification
  if(record.public_key){
    // First verify public_key → credential_id binding
    var computedCid = await sha256(unhex(record.public_key));
    if(computedCid !== record.credential_id){
      el.className="sig-block sig-fail";
      el.innerHTML="<strong>⚠ Key mismatch</strong> — the public key in this record does not match the credential ID. This record may be tampered with.";
      return;
    }

    // Try HIPKit format first, then legacy
    var verified = await verifyEd25519(record.public_key, canonStrHIPKit, record.signature);
    var usedCanon = canonStrHIPKit;
    if(verified !== true){
      verified = await verifyEd25519(record.public_key, canonStrLegacy, record.signature);
      usedCanon = canonStrLegacy;
    }

    if(verified === true){
      el.className="sig-block sig-ok";
      el.innerHTML="<strong>✓ Signature verified</strong> — Ed25519 signature cryptographically verified in your browser."
        +"<div style='margin-top:8px;font-size:11px;opacity:0.7'>Public key: <code style='font-family:Azeret Mono,monospace'>"+record.public_key.substring(0,24)+"…</code></div>"
        +"<div style='margin-top:4px;font-size:11px;opacity:0.7'>Signed: <code style='font-family:Azeret Mono,monospace'>"+usedCanon.substring(0,80)+"…</code></div>"
        +"<div style='margin-top:4px;font-size:11px;opacity:0.7'>Key binding: SHA-256(public_key) = credential_id ✓</div>";
      return;
    } else if(verified === false){
      el.className="sig-block sig-fail";
      el.innerHTML="<strong>⚠ Signature invalid</strong> — the Ed25519 signature does not match the public key and canonical data. This record may be tampered with."
        +"<div style='margin-top:8px;font-size:11px;opacity:0.7'>Signed string: <code style='font-family:Azeret Mono,monospace'>"+canonStrHIPKit.substring(0,80)+"…</code></div>";
      return;
    }
    // verified === null means browser doesn't support Ed25519 — fall through to format check
  }

  // Fallback: no public_key stored, or browser lacks Ed25519 support
  // Confirm signature presence and display canonical string for manual verification
  var reason = !record.public_key
    ? "Public key not stored in this record (pre-S38 registration). Signature format confirmed; full cryptographic verification unavailable."
    : "Your browser does not support Ed25519 verification. Signature format confirmed; try Chrome or Edge for full verification.";

  el.className="sig-block sig-pending";
  el.innerHTML="<strong>⚡ Signature present</strong> — "+reason
    +"<div style='margin-top:8px;font-size:11px;opacity:0.7'>Credential: <code style='font-family:Azeret Mono,monospace'>"+record.credential_id.substring(0,24)+"…</code></div>"
    +"<div style='margin-top:4px;font-size:11px;opacity:0.7'>Signed string: <code style='font-family:Azeret Mono,monospace'>"+canonStrHIPKit.substring(0,80)+"…</code></div>"
    +"<div style='margin-top:4px;font-size:11px;opacity:0.7'>This page is served from hipprotocol.org. A fake page at any other domain cannot produce a valid record from HIP's registry.</div>";
}

// ── Exact match handler ──
async function handleExactDrop(ev, expectedHash){
  ev.preventDefault();
  qs("exact-zone").classList.remove("drag-over");
  var f = ev.dataTransfer&&ev.dataTransfer.files&&ev.dataTransfer.files[0];
  if(f) checkExact(f, expectedHash);
}
async function handleExactFile(ev, expectedHash){
  var f = ev.target.files&&ev.target.files[0];
  if(f) checkExact(f, expectedHash);
}
async function checkExact(f, expectedHash){
  var el = qs("exact-result");
  el.innerHTML='<div class="drop-result sig-pending">Computing hash…</div>';
  try{
    var buf = await f.arrayBuffer();
    var h = await sha256(new Uint8Array(buf));
    if(h === expectedHash){
      el.innerHTML='<div class="drop-result match-exact"><strong>✓ Exact match</strong> — '+f.name+' matches the attested original byte-for-byte. This is the same file that was attested.</div>';
    } else {
      el.innerHTML='<div class="drop-result match-none"><strong>✗ No match</strong> — '+f.name+' does not match the attested content. The file may have been modified, recompressed, or this may be a different file.</div>';
    }
  }catch(e){
    el.innerHTML='<div class="drop-result match-none">Error reading file: '+e.message+'</div>';
  }
}

// ── pHash similarity handler ──
async function handlePHashDrop(ev, storedPHash){
  ev.preventDefault();
  qs("phash-zone").classList.remove("drag-over");
  var f = ev.dataTransfer&&ev.dataTransfer.files&&ev.dataTransfer.files[0];
  if(f) checkPHash(f, storedPHash);
}
async function handlePHashFile(ev, storedPHash){
  var f = ev.target.files&&ev.target.files[0];
  if(f) checkPHash(f, storedPHash);
}
async function checkPHash(f, storedPHash){
  var el = qs("phash-result");
  el.innerHTML='<div class="drop-result sig-pending">Analyzing image…</div>';
  try{
    var url = URL.createObjectURL(f);
    var img = new Image();
    img.onload = async function(){
      var ph = await computePHash(img);
      URL.revokeObjectURL(url);
      if(!ph){
        el.innerHTML='<div class="drop-result match-none">Could not compute visual fingerprint for this file.</div>';
        return;
      }
      var sim = pHashSimilarity(ph, storedPHash);
      var d = pHashDistance(ph, storedPHash);
      var cls, label, desc;
      if(d <= 5){
        cls="match-exact"; label="✓ Near-identical match";
        desc="This image is visually identical to the attested original (similarity "+sim+"%). Same image, minor compression or format difference.";
      } else if(d <= 15){
        cls="match-high"; label="✓ Strong visual match";
        desc="This image closely resembles the attested original (similarity "+sim+"%). Consistent with a screenshot, re-upload, or resize of the same image.";
      } else if(d <= 25){
        cls="match-med"; label="~ Partial similarity";
        desc="This image partially resembles the attested content (similarity "+sim+"%). May be a cropped, heavily edited, or related version.";
      } else {
        cls="match-low"; label="✗ Low similarity";
        desc="This image does not closely resemble the attested original (similarity "+sim+"%). This is likely a different image.";
      }
      el.innerHTML='<div class="drop-result '+cls+'"><strong>'+label+'</strong><br><span style="font-size:12px;opacity:0.85">'+desc+'</span></div>';
    };
    img.onerror=function(){URL.revokeObjectURL(url);el.innerHTML='<div class="drop-result match-none">Could not load image file.</div>';};
    img.src=url;
  }catch(e){
    el.innerHTML='<div class="drop-result match-none">Error: '+e.message+'</div>';
  }
}

function copyEmbed(hash, clsLabel, shortId){

function escHtml(s){
  var d=document.createElement("div");d.textContent=s;return d.innerHTML;
}

// ── Dispute functions ──
var disputeCredential = null;

function showDisputeForm(hash){
  var f=qs("dispute-form");
  var u=qs("dispute-ui");
  if(f)f.style.display="block";
  if(u)u.style.display="none";
}

function loadDisputeCred(ev){
  var f=ev.target.files&&ev.target.files[0];
  if(!f)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var obj=JSON.parse(e.target.result);
      if(!obj.credentialId||!obj.version){throw new Error("Not a valid credential")}
      disputeCredential=obj;
      var lbl=qs("dispute-cred-label");
      if(lbl)lbl.textContent="✓ Credential loaded: "+obj.credentialId.substring(0,16)+"… (Tier "+(obj.tier||"?")+")"
    }catch(ex){
      var lbl=qs("dispute-cred-label");
      if(lbl)lbl.textContent="Invalid credential file. Try again.";
      disputeCredential=null;
    }
  };
  reader.readAsText(f);
}

async function submitDispute(hash){
  var el=qs("dispute-result");
  if(!disputeCredential){
    if(el)el.innerHTML='<div class="drop-result match-none">Load your credential file first.</div>';
    return;
  }
  var reason=(qs("dispute-reason")||{}).value||"";
  if(reason.trim().length<10){
    if(el)el.innerHTML='<div class="drop-result match-none">Reason must be at least 10 characters.</div>';
    return;
  }
  var btn=qs("dispute-submit-btn");
  if(btn){btn.disabled=true;btn.textContent="Submitting…"}
  try{
    var body={
      content_hash:hash,
      credential_id:disputeCredential.credentialId,
      reason:reason.trim()
    };
    var resp=await fetch(WORKER_URL+"/dispute-proof",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    var data=await resp.json();
    if(resp.ok&&data.success){
      if(el)el.innerHTML='<div class="drop-result match-exact"><strong>✓ Dispute filed.</strong> This attestation now shows '+data.dispute_count+' dispute(s). Reload to see the updated record.</div>';
    } else {
      if(el)el.innerHTML='<div class="drop-result match-none">'+(data.error||"Dispute failed.")+'</div>';
    }
  }catch(ex){
    if(el)el.innerHTML='<div class="drop-result match-none">Error: '+ex.message+'</div>';
  }
  if(btn){btn.disabled=false;btn.textContent="Submit Dispute"}
}

// ── S40: Quick Verify Another File ──
async function quickVerifyFile(f){
  if(!f)return;
  var lbl=qs("quick-verify-label");
  var el=qs("quick-verify-result");
  if(lbl)lbl.textContent="Checking: "+f.name+"…";
  if(el)el.innerHTML='<div class="drop-result sig-pending">Computing hash and checking registry…</div>';
  try{
    var buf=await f.arrayBuffer();
    var h=await sha256(new Uint8Array(buf));
    var resp=await fetch(WORKER_URL+"/api/proof/"+h);
    var data=await resp.json();
    if(resp.ok&&data.found){
      var cls=CLS_LABELS[data.classification]||data.classification;
      var tierCls=data.credential_tier===1?"tier-1":data.credential_tier===2?"tier-2":"tier-3";
      var link=data.short_id?"https://hipprotocol.org/p/"+data.short_id:"https://hipprotocol.org/proof.html?hash="+h;
      el.innerHTML='<div class="drop-result match-exact">'
        +'<strong>✓ Attested content found</strong><br>'
        +'<span style="font-size:12px;opacity:0.9">'+cls+' · <span class="'+tierCls+'">Tier '+data.credential_tier+'</span>'
        +' · '+fmtDate(data.attested_at)+'</span><br>'
        +'<a href="'+link+'" style="font-size:11px;color:#E05A00;margin-top:6px;display:inline-block">View proof card →</a>'
        +'</div>';
    } else {
      el.innerHTML='<div class="drop-result match-none">'
        +'<strong>No attestation found</strong><br>'
        +'<span style="font-size:11px;opacity:0.7">SHA-256: '+h+'</span>'
        +'</div>';
    }
    if(lbl)lbl.textContent=f.name+" — tap to check another";
  }catch(ex){
    if(el)el.innerHTML='<div class="drop-result match-none">Error: '+ex.message+'</div>';
    if(lbl)lbl.textContent="Drop any file here to check the registry";
  }
}
function handleQuickVerifyDrop(ev){
  ev.preventDefault();
  qs("quick-verify-zone").classList.remove("drag-over");
  var f=ev.dataTransfer&&ev.dataTransfer.files&&ev.dataTransfer.files[0];
  if(f)quickVerifyFile(f);
}
function handleQuickVerifyFile(ev){
  var f=ev.target.files&&ev.target.files[0];
  if(f)quickVerifyFile(f);
}

// ── Boot ──
init();
</script>
